name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Install Lambda dependencies
        working-directory: lambda
        run: npm ci

      - name: Lambda build
        working-directory: lambda
        run: npm run build

      - name: Lambda tests
        working-directory: lambda
        run: npm run test
