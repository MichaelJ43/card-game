name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment label
        required: false
        default: prod
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'lambda/**'
      - 'deploy/terraform/**'
      - 'terraform/**'
      - 'packer/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/build-relay-ami.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  id-token: write
  contents: read
  deployments: write
  actions: write

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

jobs:
  build-relay-ami:
    uses: ./.github/workflows/build-relay-ami.yml
    with:
      promote: true
    secrets: inherit

  deploy:
    needs: build-relay-ami
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cardgame.michaelj43.dev
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}
      TF_STATE_KEY: card-game/terraform.tfstate
      TF_VAR_room_jwt_secret: ${{ secrets.ROOM_JWT_SECRET }}
      TF_VAR_environment: ${{ github.event.inputs.environment || 'prod' }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      PACKER_RELAY_AMI_ID: ${{ needs.build-relay-ami.outputs.ami_id }}
      PROMOTED_RELAY_AMI_ID: ${{ vars.TF_TURN_AMI_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      # 1. Build Lambdas and bundle them into zips.
      - name: Install site deps
        run: npm ci

      - name: Install Lambda deps
        working-directory: lambda
        run: npm ci

      - name: Build Lambdas
        working-directory: lambda
        run: npm run build

      - name: Bundle Lambda zips
        working-directory: lambda
        run: npm run bundle

      # 2. Apply Terraform (creates/updates S3, CloudFront, APIs, Dynamo, Lambdas).
      - name: Terraform init
        working-directory: deploy/terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      # Optional custom domain: TF_CUSTOM_DOMAIN (var) + TF_ACM_CERTIFICATE_ARN + TF_ROUTE53_HOSTED_ZONE_ID (secrets). See AGENTS.md / AWS_SETUP.md.
      # Empty GitHub vars must not export TF_VAR_* or Terraform sees "" instead of null.
      - name: Terraform apply
        working-directory: deploy/terraform/aws
        env:
          # Same secret as VITE_MULTIPLAYER_TURN_CREDENTIAL on the Build site step (coturn + browser).
          TURN_COTURN_STATIC_PASSWORD: ${{ secrets.TURN_COTURN_STATIC_PASSWORD }}
        run: |
          set -e
          if [ -n "${{ vars.TF_CUSTOM_DOMAIN }}" ]; then export TF_VAR_custom_domain="${{ vars.TF_CUSTOM_DOMAIN }}"; fi
          if [ -n "${{ secrets.TF_ACM_CERTIFICATE_ARN }}" ]; then export TF_VAR_acm_certificate_arn="${{ secrets.TF_ACM_CERTIFICATE_ARN }}"; fi
          if [ -n "${{ vars.TF_ALLOWED_ORIGIN }}" ]; then export TF_VAR_allowed_origin="${{ vars.TF_ALLOWED_ORIGIN }}"; fi
          if [ -n "${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}" ]; then export TF_VAR_route53_hosted_zone_id="${{ secrets.TF_ROUTE53_HOSTED_ZONE_ID }}"; fi
          RELAY_AMI_ID="${PACKER_RELAY_AMI_ID:-${PROMOTED_RELAY_AMI_ID:-}}"
          if [ -n "$RELAY_AMI_ID" ]; then export TF_VAR_turn_ami_id="$RELAY_AMI_ID"; fi
          # Optional coturn EC2 + turn.* DNS + turn-scheduled Lambda (only when Route 53 is also configured).
          if [ "${{ vars.TF_TURN_EC2_ENABLED }}" = "true" ]; then
            export TF_VAR_turn_ec2_enabled=true
            export TF_VAR_turn_coturn_static_password="${TURN_COTURN_STATIC_PASSWORD}"
          fi
          terraform apply -auto-approve -var-file=../../../terraform/prod.tfvars

      - name: Capture Terraform outputs
        id: tf
        working-directory: deploy/terraform/aws
        run: |
          echo "site_bucket=$(terraform output -raw site_bucket)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain)" >> "$GITHUB_OUTPUT"
          echo "site_url=$(terraform output -raw site_url)" >> "$GITHUB_OUTPUT"
          echo "http_api_url=$(terraform output -raw http_api_url)" >> "$GITHUB_OUTPUT"
          echo "ws_api_url=$(terraform output -raw ws_api_url)" >> "$GITHUB_OUTPUT"

      # Prefer repository Variables when set (stable URLs, no Terraform needed to
      # change them). Otherwise use Terraform outputs from this apply.
      - name: Resolve multiplayer URLs for Vite build
        id: mp
        env:
          TF_HTTP: ${{ steps.tf.outputs.http_api_url }}
          TF_WS: ${{ steps.tf.outputs.ws_api_url }}
          VAR_HTTP: ${{ vars.VITE_MULTIPLAYER_HTTP_URL }}
          VAR_WS: ${{ vars.VITE_MULTIPLAYER_WS_URL }}
        run: |
          set -e
          HTTP="${VAR_HTTP:-}"
          WS="${VAR_WS:-}"
          if [ -z "$HTTP" ]; then HTTP="${TF_HTTP}"; fi
          if [ -z "$WS" ]; then WS="${TF_WS}"; fi
          echo "http=${HTTP}" >> "$GITHUB_OUTPUT"
          echo "ws=${WS}" >> "$GITHUB_OUTPUT"
          if [ -z "$HTTP" ] || [ -z "$WS" ]; then
            echo "::warning::VITE_MULTIPLAYER_HTTP_URL / VITE_MULTIPLAYER_WS_URL are empty after resolve. Set repository Variables (recommended) or ensure Terraform outputs http_api_url and ws_api_url are non-empty."
          fi

      # 3. Build the site with multiplayer endpoints baked in.
      - name: Build site
        env:
          VITE_MULTIPLAYER_HTTP_URL: ${{ steps.mp.outputs.http }}
          VITE_MULTIPLAYER_WS_URL: ${{ steps.mp.outputs.ws }}
          # Optional coturn (hostname only, no https:// — see src/net/config.ts).
          VITE_MULTIPLAYER_TURN_HOST: ${{ vars.VITE_MULTIPLAYER_TURN_HOST }}
          VITE_MULTIPLAYER_TURN_USER: ${{ vars.VITE_MULTIPLAYER_TURN_USER }}
          VITE_MULTIPLAYER_TURN_CREDENTIAL: ${{ secrets.TURN_COTURN_STATIC_PASSWORD }}
        run: npm run build

      # 4. Sync static assets to S3 + invalidate CloudFront.
      - name: Sync assets to S3
        run: |
          aws s3 sync dist/ "s3://${{ steps.tf.outputs.site_bucket }}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${{ steps.tf.outputs.site_bucket }}/index.html" \
            --cache-control "public, max-age=60, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cloudfront_distribution_id }}" \
            --paths "/*"

      - name: Summary
        working-directory: deploy/terraform/aws
        run: |
          echo "### Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Site (public): ${{ steps.tf.outputs.site_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- CloudFront hostname: https://${{ steps.tf.outputs.cloudfront_domain }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- HTTP API: ${{ steps.tf.outputs.http_api_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- WS API: ${{ steps.tf.outputs.ws_api_url }}" >> "$GITHUB_STEP_SUMMARY"
          HR=$(terraform output -raw http_regional_domain_name 2>/dev/null || true)
          WR=$(terraform output -raw ws_regional_domain_name 2>/dev/null || true)
          if [ -n "$HR" ]; then echo "- Route 53 alias target (api → HTTP API): \`$HR\`" >> "$GITHUB_STEP_SUMMARY"; fi
          if [ -n "$WR" ]; then echo "- Route 53 alias target (ws → WebSocket API): \`$WR\`" >> "$GITHUB_STEP_SUMMARY"; fi
          TH="$(terraform output -raw turn_hostname 2>/dev/null || true)"
          if [ -n "$TH" ] && [ "$TH" != "null" ]; then echo "- TURN hostname (coturn): \`$TH\` — set Variables \`VITE_MULTIPLAYER_TURN_HOST\` / \`VITE_MULTIPLAYER_TURN_USER\` and Secret \`TURN_COTURN_STATIC_PASSWORD\` (shared with Terraform), then redeploy." >> "$GITHUB_STEP_SUMMARY"; fi
